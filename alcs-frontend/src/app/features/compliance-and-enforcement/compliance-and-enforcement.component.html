<div class="layout">
  <div class="file">
    <app-compliance-and-enforcement-details-header [file]="file" [propertyOwnerName]="propertyOwnerName" />
    <div class="content">
      <div class="nav">
        @for (route of detailsRoutes; track route) {
          <div class="nav-link" data-testid="details-nav-link">
            <div
              [routerLinkActiveOptions]="{ exact: route.path === '' }"
              [routerLink]="routeAllowed(route) ? (route.path ? route.path : './') : null"
              [ngClass]="{
                'nav-item': true,
                'nav-text': true,
                disabled: !routeAllowed(route),
              }"
              routerLinkActive="active"
              [matTooltip]="!routeAllowed(route) ? 'Contact assigned officer' : null"
            >
              <mat-icon>{{ route.icon }}</mat-icon>
              {{ route.menuTitle }}
            </div>
          </div>
        }
      </div>
      <div cdkScrollable class="child-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
